<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camilo Artigas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      color: black;
    }

    /* Navbar */
    nav {
      background: black;
      padding: 1rem;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 1rem;
      font-size: 1rem;
    }

    /* Header */
    header {
      min-height: 75vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: white;
      padding: 2rem;
      gap: 1rem;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    header h2, header h3 {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    header img {
      width: 300px;
      height: 300px;
      max-width: 100%;
      object-fit: cover;
    }

    .resume-link {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      background-color: black;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      text-decoration: none;
      border-radius: 5px;
      transition: background-color 0.3s, transform 0.3s;
      text-align: center;
    }

    .resume-link:hover {
      background-color: #555;
      transform: scale(1.05);
    }

    .styled-line {
      border: none;
      height: 4px;
      background-color: black;
      opacity: 0.2;
      width: 80%;
      max-width: 500px;
      margin: 2rem auto;
      border-radius: 5px;
    }

    /* Portfolio Grid Layout */
    :root {
      --entry-margin: 2.5vw;
      --x: calc((100vw - (14/3) * var(--entry-margin)) / 10);
      --y: calc(var(--x) + (var(--entry-margin) / 6));
      --entry-width: calc(20% - var(--entry-margin) * 2);
      --entry-width-double: calc(100% - var(--entry-margin) * 2);
      --entry-height: calc(17% - var(--entry-margin) * 2);
      --entry-height-double: calc(34% - var(--entry-margin) * 2);
    }

    .grid {
      position: relative;
      display: block;
      width: 100%;
      height: auto;
      min-height: 600px;
      margin: 20px auto;
    }

    .portfolio-item {
      position: absolute;
      background-size: cover;
      background-position: center;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.3s ease-in-out;
      object-fit: contain;
    }

    .portfolio-item .image{
      object-fit: contain;
    }

    .portfolio-item .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .portfolio-item:hover .overlay {
      opacity: 1;
    }

    /* Grid Item Positions */
    .portfolio-item:nth-child(1) { left: var(--entry-margin); top: 0%; width: calc(4*var(--y)); height: calc(6*var(--y)); }
    .portfolio-item:nth-child(2) { left: calc(2*var(--entry-margin) + calc(4*var(--y))); top: 0%; width: calc(3*var(--x)); height: calc(3*var(--x)); }
    .portfolio-item:nth-child(3) { right: 90000px; top: 0px; width: calc(6*var(--u)); height: calc(3*var(--u)); }
    .portfolio-item:nth-child(4) { left: 90000px; top: calc(var(--entry-margin) + 3*var(--u)); width: calc(4.5*var(--u)); height: calc(3*var(--u)); }

  </style>
</head>
<body>
  <!-- Navbar -->
  <nav>
    <a href="#home">Home</a>
    <a href="#portfolio">Portfolio</a>
  </nav>

  <!-- Header -->
  <header id="home">
    <h1>Hi I'm Camilo.</h1>
    <h2>Tinkerer turned engineer.</h2>
    <h3>Specializing in Product Design and Hardware,</h3>
    <h3>I'm deeply passionate about Robotics and Tech.</h3>
    <img src="assets/profile-picture.jpg" alt="Profile Picture" />
    <a href="assets/Camilo_Artigas_Resume.pdf" target="_blank" class="resume-link">View My Resume</a>
  </header>

  <!-- Horizontal Line -->
  <hr class="styled-line" />

  <!-- Portfolio Section -->
  <section class="grid" id="portfolio">
    <div class="portfolio-item">
      <a href="6dof-robotic-arm.html">
        <img src="assets/6dof-robotic-arm-2x3.png" alt="6-DOF Robot Arm" />
        <div class="overlay">6-DOF Robot Arm</div>
      </a>
    </div>

    <div class="portfolio-item">
      <a href="cycloidal-actuator.html">
        <img src="assets/cycloidal-actuator-1x1.png" alt="Cycloidal Actuator" />
        <div class="overlay">Cycloidal Actuator</div>
      </a>
    </div>

    <div class="portfolio-item">
      <a href="angled-landing-gear.html">
        <img src="assets/angled-landing-gear-2x1.JPG" alt="Angled Landing Gear" />
        <div class="overlay">Angled Landing Gear</div>
      </a>
    </div>

    <div class="portfolio-item">
      <a href="3dof-robotic-arm.html">
        <img src="assets/3dof-robotic-arm-3x2.png" alt="3-DOF Robot Arm" />
        <div class="overlay">3-DOF Robot Arm</div>
      </a>
    </div>
  </section>
</body>
</html>
